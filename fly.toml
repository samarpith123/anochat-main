app = "anochat-api"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT     = "8080"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 2

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 3000
    soft_limit = 2500

[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 1024
